name: Daily Changes Summary

on:
  schedule:
    - cron: '30 17 * * 1-5'   # Lun-Ven alle 17:30 UTC
  workflow_dispatch:
  workflow_call:
    secrets:
      COPILOT_ASSIGN_PAT:
        required: true
      TEAMS_WEBHOOK_URL:
        required: true

permissions:
  contents: read
  actions: read

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo chiamante
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.COPILOT_ASSIGN_PAT }}
          fetch-depth: 0

      - name: Setup Copilot CLI
        uses: org-test-reply-1/platform-actions/copilot-cli-setup@main
        with:
          copilot-token: ${{ secrets.COPILOT_ASSIGN_PAT }}

      - name: Genera summary
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
          REPO: ${{ github.repository }}
        run: |
          echo "## 📋 Commit ultime 24 ore" > summary.md
          echo "" >> summary.md

          git log --since="24 hours ago" \
            --pretty=format:"- [%s](https://github.com/${REPO}/commit/%H) — %an — %ar" \
            >> summary.md || echo "- Nessun commit nelle ultime 24 ore" >> summary.md

          echo "" >> summary.md
          echo "" >> summary.md
          echo "## ❌ Workflow falliti oggi" >> summary.md
          echo "" >> summary.md

          gh run list --repo "$REPO" \
            --status failure \
            --created "$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')" \
            --json displayTitle,url,createdAt \
            --jq '.[] | "- [\(.displayTitle)](\(.url)) — \(.createdAt)"' \
            >> summary.md || echo "- Nessun workflow fallito" >> summary.md

          echo "" >> summary.md
          echo "---" >> summary.md
          echo "_Generato automaticamente il $(date -u '+%Y-%m-%d alle %H:%M UTC')_" >> summary.md

          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary-${{ github.run_id }}
          path: summary.md
          retention-days: 14

      - name: Prepara messaggio Teams
        if: always()
        run: |
          COMMIT_COUNT=$(git log --since="24 hours ago" --oneline | wc -l | tr -d ' ')
          echo "TEAMS_COMMIT_COUNT=${COMMIT_COUNT}" >> "$GITHUB_ENV"

      - name: Notifica Teams
        if: always()
        uses: org-test-reply-1/platform-actions/notify-teams@main
        with:
          webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: '📋 Daily Summary - ${{ github.repository }}'
          message: 'Commit ultime 24 ore: ${{ env.TEAMS_COMMIT_COUNT }} | Repository: ${{ github.repository }} | 👉 Scarica il summary completo: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          color: 'green'
        
      
